<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Налаштування - EDMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <nav class="bg-indigo-600 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-4">
                    <span class="text-white text-xl font-bold">EDMS Admin</span>
                    <a href="/pages/users.html" class="text-indigo-100 hover:bg-indigo-500 px-3 py-2 rounded-md text-sm font-medium transition">Користувачі</a>
                    <a href="/pages/document-types.html" class="text-indigo-100 hover:bg-indigo-500 px-3 py-2 rounded-md text-sm font-medium transition">Типи документів</a>
                    <a href="/pages/departments.html" class="text-indigo-100 hover:bg-indigo-500 px-3 py-2 rounded-md text-sm font-medium transition">Відділи</a>
                    <a href="/pages/settings.html" class="bg-indigo-700 text-white px-3 py-2 rounded-md text-sm font-medium">Налаштування</a>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="h-8 w-8 rounded-full bg-indigo-800 flex items-center justify-center text-white font-bold" id="userInitials"></div>
                    <span id="userName" class="text-white text-sm hidden sm:block"></span>
                    <button onclick="window.API.logout()" class="bg-indigo-500 hover:bg-indigo-700 text-white px-3 py-2 rounded-md text-sm">Вийти</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8 w-full">
        <div class="bg-white rounded-lg shadow-sm p-6 max-w-2xl">
            <div class="mb-6">
                <h1 class="text-2xl font-bold text-gray-900">Системні налаштування</h1>
                <p class="text-sm text-gray-500 mt-1">Керування загальними правилами системи документообігу.</p>
            </div>
            
            <form id="settingsForm">
                <div class="mb-6 border border-gray-200 p-4 rounded-lg bg-gray-50">
                    <h3 class="text-lg font-medium text-gray-800 mb-4 border-b pb-2">Файли та обмеження</h3>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Максимальна кількість файлів в одному документі</label>
                        <input type="number" id="maxUploadFiles" min="1" max="30" required class="w-full sm:w-1/3 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500">
                        <p class="text-xs text-gray-500 mt-1">Встановіть ліміт від 1 до 30 файлів.</p>
                    </div>
                </div>
                
                <div id="settingsFormSuccess" class="hidden mb-4 p-2 bg-green-100 text-green-800 text-sm rounded border border-green-200">Налаштування збережено.</div>
                <div id="settingsFormError" class="hidden mb-4 p-2 bg-red-100 text-red-700 text-sm rounded border border-red-200"></div>

                <div class="flex justify-start">
                    <button type="submit" id="saveSettingsBtn" class="px-6 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 font-medium">Зберегти налаштування</button>
                </div>
            </form>
        </div>
    </main>
    <script src="/js/api.js"></script>
    <script src="/js/settings.js"></script>
</body>
</html>
