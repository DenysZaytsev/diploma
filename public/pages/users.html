<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Користувачі - EDMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <nav class="bg-indigo-600 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-4">
                    <span class="text-white text-xl font-bold">EDMS Admin</span>
                    <a href="/pages/users.html" class="bg-indigo-700 text-white px-3 py-2 rounded-md text-sm font-medium">Користувачі</a>
                    <a href="/pages/document-types.html" class="text-indigo-100 hover:bg-indigo-500 px-3 py-2 rounded-md text-sm font-medium transition">Типи документів</a>
                    <a href="/pages/departments.html" class="text-indigo-100 hover:bg-indigo-500 px-3 py-2 rounded-md text-sm font-medium transition">Відділи</a>
                    <a href="/pages/settings.html" class="text-indigo-100 hover:bg-indigo-500 px-3 py-2 rounded-md text-sm font-medium transition">Налаштування</a>
                    <a href="/pages/admin-audit.html" class="text-indigo-100 hover:bg-indigo-500 px-3 py-2 rounded-md text-sm font-medium transition">Аудит лог</a>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="h-8 w-8 rounded-full bg-indigo-800 flex items-center justify-center text-white font-bold" id="userInitials"></div>
                    <span id="userName" class="text-white text-sm hidden sm:block"></span>
                    <button onclick="window.API.logout()" class="bg-indigo-500 hover:bg-indigo-700 text-white px-3 py-2 rounded-md text-sm">Вийти</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8 w-full">
        <div class="bg-white rounded-lg shadow-sm p-6">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-gray-900">Управління користувачами</h1>
                <button onclick="openAddUserModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700 transition text-sm font-medium">+ Додати користувача</button>
            </div>
            <!-- Блок фільтрації -->
            <div class="flex flex-col sm:flex-row gap-4 mb-4">
                <select id="filterRole" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500 text-sm">
                    <option value="">Всі ролі</option>
                    <option value="admin">Адміністратор</option>
                    <option value="manager">Менеджер</option>
                    <option value="signatory">Підписант</option>
                    <option value="employee">Працівник</option>
                </select>
                <select id="filterDepartment" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500 text-sm">
                    <option value="">Всі відділи</option>
                </select>
            </div>
            <div class="overflow-x-auto shadow ring-1 ring-black ring-opacity-5 md:rounded-lg">
                <table class="min-w-full divide-y divide-gray-300">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Ім'я</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Роль</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Відділ</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Статус</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider w-1/4">Дії</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody" class="bg-white divide-y divide-gray-200">
                        <tr><td colspan="5" class="px-6 py-4 text-center text-gray-500">Завантаження...</td></tr>
                    </tbody>
                </table>
                <div id="paginationControls" class="bg-white"></div>
            </div>
            <!-- Прихований елемент для ролі, щоб не ламався users.js -->
            <span id="userRole" class="hidden"></span>
        </div>
    </main>

    <!-- Модальне вікно додавання користувача -->
    <div id="addUserModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-50">
        <div class="relative top-20 mx-auto p-5 border w-full max-w-md shadow-lg rounded-md bg-white">
            <h3 class="text-lg font-medium text-gray-900 mb-4">Новий користувач</h3>
            <form id="addUserForm" onsubmit="createUser(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">ПІБ</label>
                    <input type="text" id="newFullName" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="newEmail" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Пароль (тимчасовий)</label>
                    <input type="text" id="newPassword" required value="password123" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Роль</label>
                    <select id="newRole" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500">
                        <!-- Опції ролей будуть динамічно завантажуватися JS -->
                        <option value="employee">Працівник (Ініціатор)</option>
                        <!-- Якщо поточний користувач не SuperAdmin, опція "admin" буде прихована -->
                        <option value="manager">Менеджер підрозділу</option>
                        <option value="signatory">Підписант (Signatory)</option>
                        <option value="manager">Менеджер підрозділу</option>
                        <option value="signatory">Підписант (Signatory)</option>
                        <option value="admin">Адміністратор</option>
                    </select>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Відділ</label>
                    <select id="newDepartment" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500">
                        <option value="">Завантаження...</option>
                    </select>
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeAddUserModal()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200 text-sm font-medium">Скасувати</button>
                    <button type="submit" id="saveUserBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm font-medium">Зберегти</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальне вікно редагування користувача -->
    <div id="editUserModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-50">
        <div class="relative top-20 mx-auto p-5 border w-full max-w-md shadow-lg rounded-md bg-white">
            <h3 class="text-lg font-medium text-gray-900 mb-4">Редагувати користувача</h3>
            <form id="editUserForm" onsubmit="updateUser(event)">
                <input type="hidden" id="editUserId">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">ПІБ</label>
                    <input type="text" id="editFullName" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="editEmail" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Роль</label>
                    <!-- Select для звичайних ролей, буде прихований для SuperAdmin -->
                    <select id="editRole" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500"></select>
                    <!-- Span для відображення ролі Головного Адміністратора -->
                    <span id="editRoleDisplay" class="w-full px-3 py-2 mt-1 block bg-gray-100 border border-gray-300 rounded-md text-gray-700 cursor-not-allowed hidden"></span>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Відділ</label>
                    <select id="editDepartment" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500">
                        <option value="">Завантаження...</option>
                    </select>
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeEditUserModal()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200 text-sm font-medium">Скасувати</button>
                    <button type="submit" id="updateUserBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm font-medium">Зберегти зміни</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальне вікно зміни пароля -->
    <div id="changePasswordModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-50">
        <div class="relative top-20 mx-auto p-5 border w-full max-w-md shadow-lg rounded-md bg-white">
            <h3 class="text-lg font-medium text-gray-900 mb-4">Зміна пароля користувача</h3>
            <form id="changePasswordForm" onsubmit="submitChangePassword(event)">
                <input type="hidden" id="changePasswordUserId">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Новий пароль</label>
                    <input type="password" id="newPasswordInput" required minlength="6" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Підтвердження пароля</label>
                    <input type="password" id="confirmPasswordInput" required minlength="6" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500">
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeChangePasswordModal()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200 text-sm font-medium">Скасувати</button>
                    <button type="submit" id="savePasswordBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm font-medium">Зберегти пароль</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/users.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const deps = await window.API.fetchAPI('/departments');
                const opts = '<option value="">Оберіть відділ...</option>' + 
                             deps.map(d => `<option value="${d.name}">${d.name}</option>`).join('');
                const selectNew = document.getElementById('newDepartment');
                const selectEdit = document.getElementById('editDepartment');
                const selectFilter = document.getElementById('filterDepartment');
                
                if(selectNew) selectNew.innerHTML = opts;
                if(selectEdit) selectEdit.innerHTML = opts;
                if(selectFilter) selectFilter.innerHTML += deps.map(d => `<option value="${d.name}">${d.name}</option>`).join('');
            } catch(e) { 
                console.error('Помилка завантаження відділів', e); 
            }
        });
    </script>
</body>
</html>
