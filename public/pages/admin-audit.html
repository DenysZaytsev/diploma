<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аудит Лог Користувачів - EDMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
  <nav class="bg-indigo-600 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center space-x-4">
                <span class="text-white text-xl font-bold">EDMS Admin</span>
                <a href="/pages/users.html" class="text-indigo-100 hover:bg-indigo-500 px-3 py-2 rounded-md text-sm font-medium transition">Користувачі</a>
                <a href="/pages/document-types.html" class="text-indigo-100 hover:bg-indigo-500 px-3 py-2 rounded-md text-sm font-medium transition">Типи документів</a>
                <a href="/pages/departments.html" class="text-indigo-100 hover:bg-indigo-500 px-3 py-2 rounded-md text-sm font-medium transition">Відділи</a>
                <a href="/pages/settings.html" class="text-indigo-100 hover:bg-indigo-500 px-3 py-2 rounded-md text-sm font-medium transition">Налаштування</a>
                <a href="/pages/admin-audit.html" class="bg-indigo-700 text-white px-3 py-2 rounded-md text-sm font-medium">Аудит лог</a>
            </div>
            <div class="flex items-center space-x-4">
                <div class="h-8 w-8 rounded-full bg-indigo-800 flex items-center justify-center text-white font-bold" id="userInitials"></div>
                <span id="userName" class="text-white text-sm hidden sm:block"></span>
                <button onclick="window.API.logout()" class="bg-indigo-500 hover:bg-indigo-700 text-white px-3 py-2 rounded-md text-sm">Вийти</button>
            </div>
        </div>
    </div>
</nav>

    <main class="flex-grow max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8 w-full">
        <div class="bg-white rounded-lg shadow-sm p-6">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-gray-900">Аудит лог дій користувачів</h1>
                <div class="flex space-x-3">
                    <button id="exportCsvBtn" class="bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700 transition text-sm font-medium shadow-sm">Експорт (CSV)</button>
                    <button id="clearLogsRequestBtn" class="bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700 transition text-sm font-medium shadow-sm">Очистити логи</button>
                </div>
            </div>
            
            <!-- Панель фільтрів -->
            <div class="flex flex-wrap gap-4 mb-4 bg-gray-50 p-4 rounded-md border border-gray-200 items-end">
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-xs font-medium text-gray-500 mb-1">Пошук</label>
                    <input type="text" id="searchInput" placeholder="Пошук по імені, email чи деталях..." class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Дія</label>
                    <select id="actionFilter" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:ring-indigo-500">
                    <option value="">Всі дії</option>
                    <option value="Створення">Створення</option>
                    <option value="Редагування">Редагування</option>
                    <option value="Зміна пароля">Зміна пароля</option>
                    <option value="Видалення">Видалення</option>
                    <option value="Логін">Логін</option>
                    <option value="Призначення документа">Призначення документа</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">З дати</label>
                    <input type="date" id="dateFrom" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">По дату</label>
                    <input type="date" id="dateTo" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Сортування</label>
                    <select id="sortFilter" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:ring-indigo-500">
                    <option value="desc">Спершу нові</option>
                    <option value="asc">Спершу старі</option>
                    </select>
                </div>
                <div class="flex space-x-2">
                    <button id="applyFiltersBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-md text-sm hover:bg-indigo-700 font-medium h-[38px] transition">Фільтрувати</button>
                    <button id="resetFiltersBtn" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-md text-sm hover:bg-gray-300 font-medium h-[38px] transition">Скинути</button>
                </div>
            </div>

            <div class="overflow-x-auto shadow ring-1 ring-black ring-opacity-5 md:rounded-lg">
                <table class="min-w-full divide-y divide-gray-300">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Дата та Час</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Користувач (Ініціатор)</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Дія</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Користувач (Ціль)</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Деталі</th>
                        </tr>
                    </thead>
                    <tbody id="auditTableBody" class="bg-white divide-y divide-gray-200">
                        <tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">Завантаження...</td></tr>
                    </tbody>
                </table>
                <div id="paginationControls" class="bg-white"></div>
            </div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/admin-audit.js"></script>
</body>
</html>
