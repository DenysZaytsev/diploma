<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Типи документів - EDMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <nav class="bg-indigo-600 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-4">
                    <span class="text-white text-xl font-bold">EDMS Admin</span>
                    <a href="/pages/users.html" class="text-indigo-100 hover:bg-indigo-500 px-3 py-2 rounded-md text-sm font-medium transition">Користувачі</a>
                    <a href="/pages/document-types.html" class="bg-indigo-700 text-white px-3 py-2 rounded-md text-sm font-medium">Типи документів</a>
                    <a href="/pages/departments.html" class="text-indigo-100 hover:bg-indigo-500 px-3 py-2 rounded-md text-sm font-medium transition">Відділи</a>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="h-8 w-8 rounded-full bg-indigo-800 flex items-center justify-center text-white font-bold" id="userInitials"></div>
                    <span id="userName" class="text-white text-sm hidden sm:block"></span>
                    <button onclick="window.API.logout()" class="bg-indigo-500 hover:bg-indigo-700 text-white px-3 py-2 rounded-md text-sm">Вийти</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8 w-full">
        <div class="bg-white rounded-lg shadow-sm p-6">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Типи документів</h1>
                    <p class="text-sm text-gray-500 mt-1">Керування довідником типів, які використовуються при створенні нових документів.</p>
                </div>
                <button onclick="openAddTypeModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700 transition text-sm font-medium">+ Додати тип</button>
            </div>
            
            <div class="overflow-x-auto shadow ring-1 ring-black ring-opacity-5 md:rounded-lg">
                <table class="min-w-full divide-y divide-gray-300">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Назва (Відображення)</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Опис</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Дії</th>
                        </tr>
                    </thead>
                    <tbody id="typesTableBody" class="bg-white divide-y divide-gray-200">
                        <tr><td colspan="3" class="px-6 py-4 text-center text-gray-500">Завантаження...</td></tr>
                    </tbody>
                </table>
                <div id="paginationControls" class="bg-white"></div>
            </div>
        </div>
    </main>

    <!-- Модальне вікно створення типу документа -->
    <div id="addTypeModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-50">
        <div class="relative top-20 mx-auto p-5 border w-full max-w-md shadow-lg rounded-md bg-white">
            <h3 class="text-lg font-medium text-gray-900 mb-4">Новий тип документа</h3>
            <form id="addTypeForm" onsubmit="createDocType(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Назва (напр. Наказ, Декларація)</label>
                    <input type="text" id="typeName" required placeholder="Наказ" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Опис (опціонально)</label>
                    <textarea id="typeDescription" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500"></textarea>
                </div>
                
                <!-- Блок для помилок -->
                <div id="typeFormError" class="hidden mb-4 p-2 bg-red-100 text-red-700 text-sm rounded border border-red-200"></div>

                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeAddTypeModal()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200 text-sm font-medium">Скасувати</button>
                    <button type="submit" id="saveTypeBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm font-medium">Зберегти</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальне вікно редагування типу -->
    <div id="editTypeModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-50">
        <div class="relative top-20 mx-auto p-5 border w-full max-w-md shadow-lg rounded-md bg-white">
            <h3 class="text-lg font-medium text-gray-900 mb-4">Редагувати тип документа</h3>
            <form id="editTypeForm" onsubmit="updateDocType(event)">
                <input type="hidden" id="editTypeId">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Назва</label>
                    <input type="text" id="editTypeName" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Опис</label>
                    <textarea id="editTypeDescription" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500"></textarea>
                </div>
                <div id="editTypeFormError" class="hidden mb-4 p-2 bg-red-100 text-red-700 text-sm rounded border border-red-200"></div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeEditTypeModal()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200 text-sm font-medium">Скасувати</button>
                    <button type="submit" id="updateTypeBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm font-medium">Зберегти</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальне вікно редагування типу -->
    <div id="editTypeModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-50">
        <div class="relative top-20 mx-auto p-5 border w-full max-w-md shadow-lg rounded-md bg-white">
            <h3 class="text-lg font-medium text-gray-900 mb-4">Редагувати тип документа</h3>
            <form id="editTypeForm" onsubmit="updateDocType(event)">
                <input type="hidden" id="editTypeId">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Назва</label>
                    <input type="text" id="editTypeName" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Опис</label>
                    <textarea id="editTypeDescription" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500"></textarea>
                </div>
                <div id="editTypeFormError" class="hidden mb-4 p-2 bg-red-100 text-red-700 text-sm rounded border border-red-200"></div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeEditTypeModal()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200 text-sm font-medium">Скасувати</button>
                    <button type="submit" id="updateTypeBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm font-medium">Зберегти</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/document-types.js"></script>
</body>
</html>
